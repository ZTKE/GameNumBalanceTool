        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            min-height: 100vh;
        }

        .header {
            padding: 12px 20px;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { color: #e94560; font-size: 16px; }
        .era-filter { display: flex; gap: 6px; }
        .era-btn {
            padding: 5px 12px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .era-btn:hover { background: rgba(255,255,255,0.2); }
        .era-btn.active { background: #e94560; border-color: #e94560; }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            height: calc(100vh - 50px);
            gap: 2px;
        }

        .panel {
            background: rgba(0,0,0,0.25);
            display: flex;
            flex-direction: column;
        }
        .panel-header {
            padding: 10px 15px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .panel-icon { width: 20px; height: 20px; border-radius: 4px; }
        .panel-land .panel-icon { background: #e74c3c; }
        .panel-sea .panel-icon { background: #3498db; }
        .panel-air .panel-icon { background: #f1c40f; }
        .panel-title { font-size: 14px; font-weight: bold; }
        .panel-count { font-size: 11px; color: #888; margin-left: auto; }

        .tree-scroll {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        .tree-content {
            padding: 30px 20px 50px 20px;
            min-width: 600px;
            position: relative;
        }

        .svg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .link {
            stroke: rgba(255,255,255,0.25);
            stroke-width: 2;
            fill: none;
        }
        .link.highlighted {
            stroke: #e94560;
            stroke-width: 3;
        }

        .level-row {
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            margin-bottom: 45px;
            padding-left: 20px;
            position: relative;
            z-index: 2;
        }

        .node {
            width: 85px;
            padding: 8px 5px;
            border-radius: 6px;
            text-align: center;
            cursor: grab;
            transition: box-shadow 0.2s;
            position: relative;
            font-size: 10px;
            user-select: none;
        }
        .node:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .node.dragging {
            cursor: grabbing;
            opacity: 0.8;
            z-index: 1000;
        }
        .node.highlighted {
            box-shadow: 0 0 15px #e94560;
        }

        .node-land { background: #e74c3c; border: 2px solid #c0392b; }
        .node-sea { background: #3498db; border: 2px solid #2980b9; }
        .node-air { background: #f1c40f; border: 2px solid #d4a500; color: #1a1a2e; }

        .node-module { border-radius: 4px; opacity: 0.85; }
        .node-upgrade { border-radius: 0; }
        .node-unit { border-radius: 8px; }

        .node-era-dot {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.5);
        }
        .era-ww2 { background: #f39c12; }
        .era-coldWarEarly { background: #3498db; }
        .era-coldWarLate { background: #9b59b6; }
        .era-modern { background: #1abc9c; }

        .node-name {
            font-weight: bold;
            margin-bottom: 2px;
            word-break: break-all;
            line-height: 1.2;
        }
        .node-type { font-size: 9px; opacity: 0.7; }

        /* 详情面板 */
        .detail-panel {
            position: fixed;
            background: rgba(20,30,50,0.95);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 12px;
            max-width: 280px;
            z-index: 2000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: none;
        }
        .detail-panel.visible { display: block; }
        .detail-title { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .detail-era { font-size: 10px; padding: 2px 6px; border-radius: 3px; display: inline-block; margin-left: 5px; }
        .detail-meta { font-size: 11px; color: #888; margin-bottom: 8px; }
        .detail-desc { font-size: 12px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 4px; margin-bottom: 8px; line-height: 1.4; }
        .detail-prereq-title { font-size: 11px; color: #e94560; margin-bottom: 5px; }
        .detail-prereq-list { display: flex; flex-wrap: wrap; gap: 4px; }
        .detail-prereq-item { padding: 3px 6px; background: rgba(255,255,255,0.1); border-radius: 3px; font-size: 10px; }
        .detail-id { font-size: 10px; color: #666; margin-top: 8px; }

        .legend {
            padding: 8px;
            background: rgba(0,0,0,0.3);
            margin: 10px;
            border-radius: 4px;
            position: absolute;
            bottom: 0;
        }
        .legend-row { display: flex; gap: 8px; font-size: 10px; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        .hint {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 6px 12px;
            background: rgba(0,0,0,0.5);
            border-radius: 4px;
            font-size: 11px;
            color: #888;
            z-index: 100;
        }
    </style>
</head>

        const eraNames = {ww2:'二战',coldWarEarly:'冷战前期',coldWarLate:'冷战后期',modern:'现代'};
        const eraColors = {ww2:'#f39c12',coldWarEarly:'#3498db',coldWarLate:'#9b59b6',modern:'#1abc9c'};
        const typeNames = {Unit:'单位',Module:'模块',Upgrade:'升级'};
        const catNames = {Land:'陆军',Sea:'海军',Air:'空军'};

        let currentEra = 'all';

        // 按层级分组节点
        function getNodesByLevel(cat) {
            let nodes = techData.filter(n => n.cat === cat);
            if (currentEra !== 'all') {
                nodes = nodes.filter(n => n.era === currentEra);
            }
            const levels = {};
            nodes.forEach(n => {
                if (!levels[n.lv]) levels[n.lv] = [];
                levels[n.lv].push(n);
            });
            return {nodes, levels};
        }

        // 渲染单个分类
        function renderCategory(cat, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            const {nodes, levels} = getNodesByLevel(cat);
            document.getElementById(`count-${cat.toLowerCase()}`).textContent = `${nodes.length}节点`;

            if (nodes.length === 0) {
                container.innerHTML = '<div style="padding:20px;color:#888;text-align:center;">无匹配节点</div>';
                return;
            }

            // 创建SVG连线层
            const svgLayer = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svgLayer.setAttribute('class', 'svg-layer');
            container.appendChild(svgLayer);

            // 按层级创建行
            const maxLevel = Math.max(...Object.keys(levels).map(Number));
            for (let lv = 1; lv <= maxLevel; lv++) {
                if (!levels[lv]) continue;

                const row = document.createElement('div');
                row.className = 'level-row';

                levels[lv].forEach((n) => {
                    const node = document.createElement('div');
                    node.className = `node node-${cat.toLowerCase()} node-${n.type.toLowerCase()}`;
                    node.dataset.id = n.id;
                    node.dataset.level = lv;

                    // 时代标记
                    const eraDot = document.createElement('div');
                    eraDot.className = `node-era-dot era-${n.era}`;
                    node.appendChild(eraDot);

                    // 名称
                    const name = document.createElement('div');
                    name.className = 'node-name';
                    name.textContent = n.name.length > 10 ? n.name.slice(0,9)+'..' : n.name;
                    node.appendChild(name);

                    // 类型
                    const typeLabel = document.createElement('div');
                    typeLabel.className = 'node-type';
                    typeLabel.textContent = typeNames[n.type];
                    node.appendChild(typeLabel);

                    // 交互事件
                    node.addEventListener('mouseover', showDetail);
                    node.addEventListener('mouseout', hideDetail);
                    node.addEventListener('click', highlightPath);

                    // 拖拽事件
                    makeDraggable(node, containerId);

                    row.appendChild(node);
                });

                container.appendChild(row);
            }

            // 绘制连线
            setTimeout(() => drawLinks(cat, containerId, nodes), 50);
        }

        // 拖拽功能 - 使用transform避免布局偏移
        function makeDraggable(node, containerId) {
            let isDragging = false;
            let startX, startY, nodeStartX, nodeStartY;

            node.addEventListener('mousedown', function(e) {
                isDragging = true;
                node.classList.add('dragging');
                startX = e.clientX;
                startY = e.clientY;

                // 获取当前的transform值
                const style = window.getComputedStyle(node);
                const matrix = new DOMMatrix(style.transform);
                nodeStartX = matrix.m41 || 0;
                nodeStartY = matrix.m42 || 0;

                e.preventDefault();
                e.stopPropagation();
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                const dx = e.clientX - startX;
                const dy = e.clientY - startY;
                node.style.transform = `translate(${nodeStartX + dx}px, ${nodeStartY + dy}px)`;
            });

            document.addEventListener('mouseup', function(e) {
                if (!isDragging) return;
                isDragging = false;
                node.classList.remove('dragging');
                // 重绘连线
                const tech = techData.find(t => t.id === node.dataset.id);
                if (tech) {
                    const cat = tech.cat;
                    const nodes = techData.filter(n => n.cat === cat && (currentEra === 'all' || n.era === currentEra));
                    drawLinks(cat, `tree-${cat.toLowerCase()}`, nodes);
                }
            });
        }

        // 绘制连线
        function drawLinks(cat, containerId, nodes) {
            const container = document.getElementById(containerId);
            const svgLayer = container.querySelector('.svg-layer');
            if (!svgLayer) return;

            const rect = container.getBoundingClientRect();
            svgLayer.setAttribute('width', container.scrollWidth);
            svgLayer.setAttribute('height', container.scrollHeight);

            svgLayer.innerHTML = '';

            // 获取所有节点位置（getBoundingClientRect已包含transform效果）
            const positions = {};
            container.querySelectorAll('.node').forEach(nodeEl => {
                const id = nodeEl.dataset.id;
                const nodeRect = nodeEl.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                positions[id] = {
                    x: nodeRect.left - containerRect.left + nodeRect.width / 2 + container.scrollLeft,
                    y: nodeRect.top - containerRect.top + nodeRect.height + container.scrollTop,
                    topY: nodeRect.top - containerRect.top + container.scrollTop
                };
            });

            // 绘制连线
            nodes.forEach(n => {
                n.pre.forEach(preId => {
                    if (!positions[preId] || !positions[n.id]) return;

                    const from = positions[preId];
                    const to = positions[n.id];
                    const midY = from.y + (to.topY - from.y) / 2;

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const d = `M ${from.x} ${from.y} C ${from.x} ${midY}, ${to.x} ${midY}, ${to.x} ${to.topY}`;
                    path.setAttribute('d', d);
                    path.setAttribute('class', 'link');
                    path.setAttribute('data-from', preId);
                    path.setAttribute('data-to', n.id);
                    svgLayer.appendChild(path);
                });
            });
        }

        // 显示详情
        function showDetail(e) {
            const panel = document.getElementById('detailPanel');

            const eraBadge = document.getElementById('detailEra');
            eraBadge.textContent = eraNames[n.era];
            eraBadge.style.background = eraColors[n.era];
            eraBadge.style.color = '#fff';

            document.getElementById('detailMeta').textContent = `${catNames[n.cat]} | ${typeNames[n.type]} | Lv${n.lv}`;
            document.getElementById('detailDesc').textContent = n.desc;
            document.getElementById('detailId').textContent = n.wid ? `武器ID: ${n.wid}` : '';

            const prereqList = document.getElementById('detailPrereq');
            prereqList.innerHTML = '';
            if (n.pre.length > 0) {
                n.pre.forEach(pid => {
                    const pn = techData.find(t => t.id === pid);
                    if (pn) {
                        const item = document.createElement('span');
                        item.className = 'detail-prereq-item';
                        item.textContent = pn.name;
                        prereqList.appendChild(item);
                    }
                });
            } else {
                prereqList.innerHTML = '<span class="detail-prereq-item">无前置</span>';
            }

            // 定位
            const rect = this.getBoundingClientRect();
            let left = rect.right + 10;
            let top = rect.top;
            if (left + 280 > window.innerWidth) left = rect.left - 290;
            if (top + 180 > window.innerHeight) top = window.innerHeight - 190;

            panel.style.left = left + 'px';
            panel.style.top = top + 'px';
            panel.classList.add('visible');
        }

        function hideDetail() {
            document.getElementById('detailPanel').classList.remove('visible');
        }

        // 高亮路径
        function highlightPath(e) {
            const id = this.dataset.id;
            const n = techData.find(t => t.id === id);
            const cat = n.cat;
            const container = document.getElementById(`tree-${cat.toLowerCase()}`);

            // 清除之前高亮
            container.querySelectorAll('.node.highlighted').forEach(el => el.classList.remove('highlighted'));
            container.querySelectorAll('.link.highlighted').forEach(el => el.classList.remove('highlighted'));

            // 递归高亮
            function highlightUp(nid) {
                const nodeEl = container.querySelector(`.node[data-id="${nid}"]`);
                if (nodeEl) nodeEl.classList.add('highlighted');

                const t = techData.find(x => x.id === nid);
                if (t && t.pre) {
                    t.pre.forEach(pid => {
                        const linkEl = container.querySelector(`.link[data-from="${pid}"][data-to="${nid}"]`);
                        if (linkEl) linkEl.classList.add('highlighted');
                        highlightUp(pid);
                    });
                }
            }
            highlightUp(id);
        }

        // 时代筛选
        document.querySelectorAll('.era-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.era-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentEra = this.dataset.era;
                renderAll();
            });
        });

        // 渲染所有
        function renderAll() {
            renderCategory('Land', 'tree-land');
            renderCategory('Sea', 'tree-sea');
            renderCategory('Air', 'tree-air');
        }

        // 窗口调整
        window.addEventListener('resize', () => {
            setTimeout(() => {
                ['Land', 'Sea', 'Air'].forEach(cat => {
                    const nodes = techData.filter(n => n.cat === cat && (currentEra === 'all' || n.era === currentEra));
                    drawLinks(cat, `tree-${cat.toLowerCase()}`, nodes);
                });
            }, 100);
        });

        // 初始化
        renderAll();
    </script>
</body>
</html>
